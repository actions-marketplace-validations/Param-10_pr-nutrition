name: Bug Report
description: Report a bug in the PR Nutrition analyzer or CLI
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: PR Nutrition Version
      description: What version of PR Nutrition are you running?
      placeholder: "e.g. 0.2.0"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command Run
      description: The exact command you ran
      placeholder: "pr-nutrition --repo . --base main --head HEAD"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: OS / Node Version
      description: Operating system and Node version
      placeholder: "macOS 15.0 / Node 22.13.0"
    validations:
      required: true
  - type: textarea
    id: repo
    attributes:
      label: Sanitized Repo Structure or Paths
      description: Provide the relevant file paths or structure (e.g., `src/auth/index.ts`)
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy Check
      options:
        - label: This issue does NOT contain secrets or private code
          required: true
